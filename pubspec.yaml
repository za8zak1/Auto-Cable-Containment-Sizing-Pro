name: auto_cable_sizing_pro
description: "Malaysia IEC LV cable sizing assistant - automatic cable recommendation with ampacity, voltage drop, R+X mode and protection device suggestion."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.2

  # Local persistence (theme, settings, saved projects)
  shared_preferences: ^2.2.3

  # PDF report export (Detailed Design "PDF" button)
  pdf: ^3.11.1
  printing: ^5.13.1
  path_provider: ^2.1.3

  # CSV import/export for the cable database
  csv: ^6.0.0

  # Nicer number input formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/cable_database_sample.json
